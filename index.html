<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Prompt Library</h1>
            <p>Save and manage your prompts</p>
        </header>

        <section class="prompt-form">
            <h2>Add New Prompt</h2>
            <form id="promptForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Enter prompt title" required>
                </div>
                <div class="form-group">
                    <label for="content">Prompt Content</label>
                    <textarea id="content" placeholder="Enter your prompt..." rows="4" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Save Prompt</button>
            </form>
        </section>

        <section class="prompt-list">
            <h2>Your Prompts</h2>
            <div id="promptsContainer"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
