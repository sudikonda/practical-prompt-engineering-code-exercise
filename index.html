<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div class="header-content">
        <div>
          <h1>Prompt Library</h1>
          <p>Save and manage your prompts locally.</p>
        </div>
        <div class="header-actions">
          <button id="btn-import" class="btn-secondary" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7,10 12,15 17,10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Import
          </button>
          <button id="btn-export" class="btn-secondary" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17,8 12,3 7,8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Export
          </button>
        </div>
      </div>
    </header>

    <section class="panel form-panel">
      <form id="prompt-form" autocomplete="off">
        <div class="field">
          <label for="title">Prompt Title</label>
          <input id="title" name="title" type="text" required />
        </div>
        <div class="field">
          <label for="model">Model Name</label>
          <input id="model" name="model" type="text" placeholder="e.g., gpt-4, claude-3-opus" maxlength="100" />
        </div>
        <div class="field">
          <label for="content">Prompt Content</label>
          <textarea id="content" name="content" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn-save">Save Prompt</button>
      </form>
    </section>

    <section class="panel list-panel">
      <h2>Saved Prompts</h2>
      <div id="prompt-list" class="prompt-grid"></div>
    </section>
  </main>

  <script src="metadata.js"></script>
  <script src="export-import.js"></script>
  <script src="script.js"></script>
  </body>
</html>
